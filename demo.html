<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaVozLine — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;500;600;700&family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --yellow: #FFD700;
            --yellow-dark: #E6C200;
            --black: #1a1a1a;
            --white: #FFFFFF;
            --gray: #757575;
            --gray-light: #f5f5f5;
            --green: #2E7D32;
            --blue: #0D47A1;
            --purple: #6A1B9A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arimo', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: var(--black);
            padding: 1rem 2rem;
            border-bottom: 3px solid var(--yellow);
        }

        .header-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Oswald', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .lang-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid var(--yellow);
            background: transparent;
            color: var(--yellow);
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .lang-btn.active {
            background: var(--yellow);
            color: var(--black);
        }

        /* Demo Selection */
        .demo-select {
            max-width: 800px;
            margin: 0 auto;
            padding: 1.5rem 1rem;
            width: 100%;
        }

        .demo-label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--gray);
            margin-bottom: 0.75rem;
            display: block;
        }

        .demo-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .demo-btn {
            padding: 12px 8px;
            border: 2px solid var(--gray);
            background: transparent;
            color: var(--white);
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .demo-btn:hover {
            border-color: var(--yellow);
        }

        .demo-btn.active {
            background: var(--yellow);
            color: var(--black);
            border-color: var(--yellow);
        }

        .demo-btn.property { --accent: var(--blue); }
        .demo-btn.str { --accent: var(--green); }
        .demo-btn.parador { --accent: var(--purple); }
        .demo-btn.hotel { --accent: #C62828; }

        .demo-btn.active.property { background: var(--blue); border-color: var(--blue); color: var(--white); }
        .demo-btn.active.str { background: var(--green); border-color: var(--green); color: var(--white); }
        .demo-btn.active.parador { background: var(--purple); border-color: var(--purple); color: var(--white); }
        .demo-btn.active.hotel { background: #C62828; border-color: #C62828; color: var(--white); }

        /* Chat Container */
        .chat-container {
            flex: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1rem 1rem;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .message.user {
            align-items: flex-end;
        }

        .message.assistant {
            align-items: flex-start;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 1rem;
            line-height: 1.5;
        }

        .message.user .message-bubble {
            background: var(--yellow);
            color: var(--black);
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-bubble {
            background: #2a2a2a;
            color: var(--white);
            border-bottom-left-radius: 4px;
        }

        .listen-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: none;
            background: var(--yellow);
            color: var(--black);
            font-family: 'Arimo', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.2s;
        }

        .listen-btn:hover {
            background: var(--yellow-dark);
        }

        .listen-btn.playing {
            background: var(--green);
            color: var(--white);
        }

        .listen-btn svg {
            width: 14px;
            height: 14px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            gap: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid #333;
        }

        .chat-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #333;
            background: #2a2a2a;
            color: var(--white);
            font-family: 'Arimo', sans-serif;
            font-size: 1rem;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--yellow);
        }

        .chat-input::placeholder {
            color: var(--gray);
        }

        .send-btn {
            padding: 14px 24px;
            border: none;
            background: var(--yellow);
            color: var(--black);
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .send-btn:hover {
            background: var(--yellow-dark);
        }

        .send-btn:disabled {
            background: var(--gray);
            cursor: not-allowed;
        }

        /* Welcome Message */
        .welcome {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray);
        }

        .welcome h2 {
            font-family: 'Oswald', sans-serif;
            font-size: 1.5rem;
            color: var(--yellow);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .welcome p {
            font-size: 1rem;
        }

        /* Question Counter */
        .question-counter {
            text-align: center;
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: var(--gray);
            padding: 0.5rem;
            letter-spacing: 1px;
        }

        .question-counter span {
            color: var(--yellow);
        }

        /* Loading */
        .loading {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
        }

        .loading-dot {
            width: 8px;
            height: 8px;
            background: var(--yellow);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .demo-buttons {
                grid-template-columns: repeat(2, 1fr);
            }

            .header-container {
                flex-direction: column;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">LaVozLine Demo</div>
            <div class="lang-toggle">
                <button class="lang-btn active" data-lang="en">English</button>
                <button class="lang-btn" data-lang="es">Español</button>
            </div>
        </div>
    </header>

    <div class="demo-select">
        <span class="demo-label" data-en="Select Demo" data-es="Selecciona Demo">Select Demo</span>
        <div class="demo-buttons">
            <button class="demo-btn property active" data-demo="property" data-en="Property Mgmt" data-es="Admin. Propiedades">Property Mgmt</button>
            <button class="demo-btn str" data-demo="str" data-en="Vacation Rental" data-es="Alquiler Vacacional">Vacation Rental</button>
            <button class="demo-btn parador" data-demo="parador" data-en="Parador" data-es="Parador">Parador</button>
            <button class="demo-btn hotel" data-demo="hotel" data-en="Boutique Hotel" data-es="Hotel Boutique">Boutique Hotel</button>
        </div>
    </div>

    <div class="chat-container">
        <div class="question-counter">
            <span data-en="Questions" data-es="Preguntas">Questions</span>: <span id="q-count">0</span>/3
        </div>

        <div class="chat-messages" id="chat-messages">
            <div class="welcome">
                <h2 data-en="Welcome to LaVozLine" data-es="Bienvenido a LaVozLine">Welcome to LaVozLine</h2>
                <p data-en="Select a demo above and ask up to 3 questions." data-es="Selecciona un demo arriba y haz hasta 3 preguntas.">Select a demo above and ask up to 3 questions.</p>
            </div>
        </div>

        <div class="input-area">
            <input type="text" class="chat-input" id="chat-input" data-placeholder-en="Type your question..." data-placeholder-es="Escribe tu pregunta..." placeholder="Type your question...">
            <button class="send-btn" id="send-btn" data-en="Send" data-es="Enviar">Send</button>
        </div>
    </div>

    <script>
        // State
        let currentLang = 'en';
        let currentDemo = 'property';
        let questionCount = 0;
        let conversationHistory = [];
        let currentAudio = null;

        // Demo data
        const demoData = {
            property: {
                en: {

                    }
                },
                es: {
                    greeting: "¡Bienvenido a Palmeras del Sol en Condado! Este es un complejo de apartamentos de lujo con 24 unidades. ¿En qué puedo ayudarte hoy?",
                    properties: {
                        name: "Palmeras del Sol",
                        location: "Condado, San Juan",
                        type: "Apartamentos de lujo",
                        units: "24 unidades (Studios, 1 cuarto, 2 cuartos)",
                        rent: "Studios $1,400 | 1 cuarto $1,800 | 2 cuartos $2,400",

                        available: "2 unidades (1 studio, 1 de 2 cuartos)",

                        pets: "Perros/gatos pequeños OK, $500 depósito + $50/mes",
                        utilities: "Agua incluida, inquilino paga luz"
                    }
                }
            },
            str: {
                en: {
                    greeting: "Welcome to Villa Serena in Rincón! This is a beautiful 3BR/2BA house with a pool. How can I help you today?",
                    properties: {
                        name: "Villa Serena",
                        location: "Rincón",
                        type: "3BR/2BA house with pool",
                        sleeps: "8 guests",
                        rate: "$350/night (2-night minimum)",
                        wifi: "Network: VillaSerena / Password: Sunset2024",
                        lockbox: "Keypad on front door, code 5678",
                        checkin: "3pm check-in / 10am check-out",
                        pool: "Open until 10pm, no glass near pool",
                        nearby: "Steps Beach 5-min drive, The Pool Bar, La Copa Llena"
                    }
                },
                es: {
                    greeting: "¡Bienvenido a Villa Serena en Rincón! Esta es una hermosa casa de 3 cuartos y 2 baños con piscina. ¿En qué puedo ayudarte hoy?",
                    properties: {
                        name: "Villa Serena",
                        location: "Rincón",
                        type: "Casa 3 cuartos/2 baños con piscina",
                        sleeps: "8 huéspedes",
                        rate: "$350/noche (mínimo 2 noches)",
                        wifi: "Red: VillaSerena / Contraseña: Sunset2024",
                        lockbox: "Teclado en puerta principal, código 5678",
                        checkin: "Check-in 3pm / Check-out 10am",
                        pool: "Abierta hasta 10pm, no vidrio cerca de la piscina",
                        nearby: "Steps Beach a 5 min, The Pool Bar, La Copa Llena"
                    }
                }
            },
            parador: {
                en: {
                    greeting: "Welcome to Parador El Coquí in Guánica! This is a historic hacienda parador with 12 rooms. How can I help you today?",
                    properties: {
                        name: "Parador El Coquí",
                        location: "Guánica",
                        type: "Historic hacienda parador",
                        rooms: "12 rooms",
                        rates: "Standard $99 | Garden View $129 | Hacienda Suite $169",
                        amenities: "Pool, courtyard dining, free WiFi, parking, hammocks",
                        breakfast: "Included (7:30am-9:30am)",
                        checkin: "2pm check-in / 10am check-out",
                        pets: "Small dogs OK, $25/night fee",
                        nearby: "Gilligan's Island, Guánica Dry Forest, bioluminescent bay"
                    }
                },
                es: {
                    greeting: "¡Bienvenido al Parador El Coquí en Guánica! Este es un parador histórico tipo hacienda con 12 habitaciones. ¿En qué puedo ayudarte hoy?",
                    properties: {
                        name: "Parador El Coquí",
                        location: "Guánica",
                        type: "Parador histórico tipo hacienda",
                        rooms: "12 habitaciones",
                        rates: "Estándar $99 | Vista Jardín $129 | Suite Hacienda $169",
                        amenities: "Piscina, comedor en patio, WiFi gratis, estacionamiento, hamacas",
                        breakfast: "Incluido (7:30am-9:30am)",
                        checkin: "Check-in 2pm / Check-out 10am",
                        pets: "Perros pequeños OK, $25/noche",
                        nearby: "Gilligan's Island, Bosque Seco de Guánica, bahía bioluminiscente"
                    }
                }
            },
            hotel: {
                en: {
                    greeting: "Welcome to Hotel Paloma in Old San Juan! This is a colonial boutique hotel with 18 rooms. How can I help you today?",
                    properties: {
                        name: "Hotel Paloma",
                        location: "Old San Juan",
                        type: "Colonial boutique hotel",
                        rooms: "18 rooms",
                        rates: "Classic $249 | Superior $319 | Deluxe Suite $429 | Paloma Suite $549",
                        amenities: "Rooftop terrace bar, complimentary breakfast, free WiFi, concierge",
                        parking: "Valet $35/night, public garage 2 blocks ~$25/day",
                        checkin: "3pm check-in / 12pm check-out",
                        pets: "Small dogs under 20 lbs OK, $50/night",
                        nearby: "El Morro, La Fortaleza, Cathedral, La Factoría"
                    }
                },
                es: {
                    greeting: "¡Bienvenido al Hotel Paloma en el Viejo San Juan! Este es un hotel boutique colonial con 18 habitaciones. ¿En qué puedo ayudarte hoy?",
                    properties: {
                        name: "Hotel Paloma",
                        location: "Viejo San Juan",
                        type: "Hotel boutique colonial",
                        rooms: "18 habitaciones",
                        rates: "Clásica $249 | Superior $319 | Suite Deluxe $429 | Suite Paloma $549",
                        amenities: "Terraza bar, desayuno incluido, WiFi gratis, concierge",
                        parking: "Valet $35/noche, garaje público 2 cuadras ~$25/día",
                        checkin: "Check-in 3pm / Check-out 12pm",
                        pets: "Perros pequeños menos de 20 lbs OK, $50/noche",
                        nearby: "El Morro, La Fortaleza, Catedral, La Factoría"
                    }
                }
            }
        };

        const closingPitch = {
            en: "That's what LaVozLine can do for your business. Calls answered 24/7, questions handled, no missed opportunities. Ready to get your own AI call center? Visit lavozpr.com/vozline or call GoStar Digital. Pricing starts at $199/month. Thanks for trying the demo!",
            es: "Esto es lo que LaVozLine puede hacer por tu negocio. Llamadas contestadas 24/7, preguntas manejadas, sin oportunidades perdidas. ¿Listo para tu propio call center de IA? Visita lavozpr.com/vozline o llama a GoStar Digital. Precios desde $199/mes. ¡Gracias por probar el demo!"
        };

        // DOM Elements
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const qCount = document.getElementById('q-count');
        const langBtns = document.querySelectorAll('.lang-btn');
        const demoBtns = document.querySelectorAll('.demo-btn');

        // Language Toggle
        langBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentLang = btn.dataset.lang;
                langBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                updateLanguage();
                resetChat();
            });
        });

        // Demo Toggle
        demoBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                currentDemo = btn.dataset.demo;
                demoBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                resetChat();
            });
        });

        // Update Language
        function updateLanguage() {
            document.querySelectorAll('[data-en][data-es]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
            chatInput.placeholder = chatInput.getAttribute(`data-placeholder-${currentLang}`);
        }

        // Reset Chat
        function resetChat() {
            questionCount = 0;
            conversationHistory = [];
            qCount.textContent = '0';
            chatMessages.innerHTML = '';
            
            // Add greeting
            const greeting = demoData[currentDemo][currentLang].greeting;
            addMessage('assistant', greeting);
        }

        // Add Message
        function addMessage(role, content) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            bubbleDiv.textContent = content;
            messageDiv.appendChild(bubbleDiv);

            if (role === 'assistant') {
                const listenBtn = document.createElement('button');
                listenBtn.className = 'listen-btn';
                listenBtn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    ${currentLang === 'en' ? 'Listen' : 'Escuchar'}
                `;
                listenBtn.addEventListener('click', () => playAudio(content, listenBtn));
                messageDiv.appendChild(listenBtn);
            }

            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Play Audio via ElevenLabs
        async function playAudio(text, btn) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                document.querySelectorAll('.listen-btn').forEach(b => b.classList.remove('playing'));
            }

            btn.classList.add('playing');
            btn.innerHTML = `
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
                ${currentLang === 'en' ? 'Playing...' : 'Reproduciendo...'}
            `;

            try {
                // Use ElevenLabs API
                const voiceId = currentLang === 'en' ? 'ErXwobaYiN019PkySvjV' : 'EXAVITQu4vr4xnSDxMaL'; // Antoni for EN, Bella for ES
                
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'xi-api-key': 'YOUR_ELEVENLABS_API_KEY' // Replace with your key
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: 'eleven_multilingual_v2',
                        voice_settings: {
                            stability: 0.5,
                            similarity_boost: 0.75
                        }
                    })
                });

                if (!response.ok) throw new Error('TTS failed');

                const audioBlob = await response.blob();
                const audioUrl = URL.createObjectURL(audioBlob);
                currentAudio = new Audio(audioUrl);
                
                currentAudio.onended = () => {
                    btn.classList.remove('playing');
                    btn.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                        </svg>
                        ${currentLang === 'en' ? 'Listen' : 'Escuchar'}
                    `;
                };

                currentAudio.play();
            } catch (error) {
                console.error('Audio error:', error);
                btn.classList.remove('playing');
                btn.innerHTML = `
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                    ${currentLang === 'en' ? 'Listen' : 'Escuchar'}
                `;
                alert(currentLang === 'en' ? 'Audio playback failed. Please try again.' : 'Error de audio. Por favor intenta de nuevo.');
            }
        }

        // Generate Response
        function generateResponse(question) {
            const props = demoData[currentDemo][currentLang].properties;
            const q = question.toLowerCase();

            // Simple keyword matching for demo purposes
            if (currentLang === 'en') {
                if (q.includes('rent') || q.includes('price') || q.includes('cost') || q.includes('rate')) {
                    return props.rent || props.rates || props.rate;
                }
                if (q.includes('available') || q.includes('vacancy') || q.includes('opening')) {
                    return props.available || `We have rooms available. ${props.rates || props.rent}`;
                }
                if (q.includes('amenities') || q.includes('include') || q.includes('offer')) {
                    return props.amenities;
                }
                if (q.includes('pet') || q.includes('dog') || q.includes('cat')) {
                    return props.pets;
                }
                if (q.includes('parking')) {
                    return props.parking || 'Free parking is included.';
                }
                if (q.includes('check') || q.includes('time')) {
                    return props.checkin;
                }
                if (q.includes('wifi') || q.includes('internet')) {
                    return props.wifi || 'Free WiFi is included throughout the property.';
                }
                if (q.includes('nearby') || q.includes('around') || q.includes('restaurant') || q.includes('beach')) {
                    return props.nearby;
                }
                if (q.includes('breakfast')) {
                    return props.breakfast || 'Breakfast information is available upon request.';
                }
                if (q.includes('maintenance') || q.includes('emergency') || q.includes('repair')) {
                    return props.maintenance || 'We have 24/7 emergency support available.';
                }
                return `At ${props.name} in ${props.location}, we'd be happy to help. Could you be more specific about what you'd like to know?`;
            } else {
                if (q.includes('rent') || q.includes('precio') || q.includes('costo') || q.includes('tarifa') || q.includes('cuanto')) {
                    return props.rent || props.rates || props.rate;
                }
                if (q.includes('disponible') || q.includes('vacante') || q.includes('hay')) {
                    return props.available || `Tenemos habitaciones disponibles. ${props.rates || props.rent}`;
                }
                if (q.includes('amenidades') || q.includes('incluye') || q.includes('ofrece')) {
                    return props.amenities;
                }
                if (q.includes('mascota') || q.includes('perro') || q.includes('gato')) {
                    return props.pets;
                }
                if (q.includes('estacionamiento') || q.includes('parking')) {
                    return props.parking || 'Estacionamiento gratis incluido.';
                }
                if (q.includes('check') || q.includes('hora') || q.includes('llegada') || q.includes('salida')) {
                    return props.checkin;
                }
                if (q.includes('wifi') || q.includes('internet')) {
                    return props.wifi || 'WiFi gratis incluido en toda la propiedad.';
                }
                if (q.includes('cerca') || q.includes('alrededor') || q.includes('restaurante') || q.includes('playa')) {
                    return props.nearby;
                }
                if (q.includes('desayuno')) {
                    return props.breakfast || 'Información de desayuno disponible.';
                }
                if (q.includes('mantenimiento') || q.includes('emergencia') || q.includes('reparación')) {
                    return props.maintenance || 'Tenemos soporte de emergencia 24/7.';
                }
                return `En ${props.name} en ${props.location}, estamos para ayudarte. ¿Podrías ser más específico sobre lo que te gustaría saber?`;
            }
        }

        // Send Message
        async function sendMessage() {
            const message = chatInput.value.trim();
            if (!message || questionCount >= 3) return;

            // Add user message
            addMessage('user', message);
            chatInput.value = '';
            sendBtn.disabled = true;

            // Show loading
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = '<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>';
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Simulate delay
            await new Promise(resolve => setTimeout(resolve, 800));

            // Remove loading
            loadingDiv.remove();

            // Increment question count
            questionCount++;
            qCount.textContent = questionCount;

            // Generate response
            let response = generateResponse(message);

            // Add closing pitch after 3rd question
            if (questionCount >= 3) {
                response += '\n\n' + closingPitch[currentLang];
                chatInput.disabled = true;
                chatInput.placeholder = currentLang === 'en' ? 'Demo complete. Select a new demo to continue.' : 'Demo completo. Selecciona un nuevo demo para continuar.';
            }

            addMessage('assistant', response);
            sendBtn.disabled = false;
        }

        // Event Listeners
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Initialize
        resetChat();
    </script>
</body>
</html>
